        <td align="center">

                        <h1 style="color: blue;">Help Desk</h1>

                </tr>

                            <tr>
                                <td style="border: 1px solid #e1e1e1; width: 550px; height: 3em; text-align: left;padding-left:15px; vertical-align: middle; font-size: 1rem; background-color: #f3f3f3;">
                                    ${text}
                                </td>
                            </tr>

                    </td>
                </tr>
            </table>
